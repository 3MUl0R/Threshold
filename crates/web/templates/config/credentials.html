{% extends "base.html" %}

{% block title %}Credentials — Threshold{% endblock %}

{% block content %}
<p class="breadcrumb"><a href="/config">Config</a> / Credentials</p>
<h2>Credentials</h2>
<p>Secrets are stored in the secret store. Values are never displayed.</p>

<figure>
<table>
    <thead>
        <tr>
            <th>Credential</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for cred in credentials %}
        <tr>
            <td>
                <strong>{{ cred.label }}</strong>
                <br><small><code>{{ cred.key }}</code></small>
            </td>
            <td>
                {% if cred.configured %}
                <span style="color:#57f287">&#10003; Configured</span>
                {% else %}
                <span style="color:#ed4245">&#10007; Not set</span>
                {% endif %}
            </td>
            <td>
                <details>
                    <summary>{% if cred.configured %}Update{% else %}Set{% endif %}</summary>
                    <form method="post" action="/config/credentials/{{ cred.key }}">
                        <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                        <input type="password" name="value" placeholder="Enter secret value" autocomplete="off" required>
                        <button type="submit" class="outline">Save</button>
                    </form>
                </details>
                {% if cred.configured %}
                <form method="post" action="/config/credentials/{{ cred.key }}/delete"
                      onsubmit="return confirm('Delete this credential?')"
                      style="display:inline">
                    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                    <button type="submit" class="outline secondary" style="padding:0.2rem 0.5rem;font-size:0.8rem">Delete</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>

{% endblock %}
