<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Threshold{% endblock %}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><strong>Threshold</strong></li>
        </ul>
        <ul>
            <li><a href="/"{% if nav_active == "dashboard" %} class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/conversations"{% if nav_active == "conversations" %} class="active"{% endif %}>Conversations</a></li>
            <li><a href="/schedules"{% if nav_active == "schedules" %} class="active"{% endif %}>Schedules</a></li>
            <li><a href="/audit"{% if nav_active == "audit" %} class="active"{% endif %}>Audit</a></li>
            <li><a href="/logs"{% if nav_active == "logs" %} class="active"{% endif %}>Logs</a></li>
            <li><a href="/config"{% if nav_active == "config" %} class="active"{% endif %}>Config</a></li>
        </ul>
    </nav>

    <main class="container">
        {% if flash %}
        <div class="flash flash-{{ flash.level }}" role="alert">
            {{ flash.message }}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>Threshold Web Interface</small>
    </footer>
</body>
</html>
